<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nike Shoe Animation</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #242426; /* Color de fondo oscuro */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .co-carousel-wrap {
      width: 100%;
      max-width: 900px;
      background: #fdfdfd;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .co-carousel {
      width: 100%;
      padding-bottom: 50px; /* Espacio para la navegación */
      overflow: hidden;
      position: relative;
    }

    .co-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 500px;
      background-color: var(--card-bg); /* Variable dinámica por slide */
      border-radius: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Animación del Zapato */
    .co-card__shoe {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      max-width: 400px;
      z-index: 2;
    }

    .co-card__shoe-img {
      width: 100%;
      transform: rotate(-25deg) scale(0.8) translateY(50px);
      opacity: 0;
      transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.8s ease;
    }

    /* El estado activo del slide activa la animación */
    .swiper-slide-active .co-card__shoe-img {
      transform: rotate(-20deg) scale(1) translateY(0);
      opacity: 1;
    }

    .co-card__shoe-shadow {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 20px;
      background: rgba(0, 0, 0, 0.3);
      filter: blur(15px);
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.8s ease 0.3s;
    }

    .swiper-slide-active .co-card__shoe-shadow {
      opacity: 1;
    }

    /* Información y Textos */
    .co-card__info {
      position: absolute;
      bottom: 40px;
      text-align: center;
      z-index: 3;
    }

    .text-mask {
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    .text-mask span {
      display: inline-block;
      transform: translateY(100%);
      opacity: 0;
      transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.6s ease;
    }

    /* Delays para efecto en cascada de los textos */
    .co-card__collection.text-mask span { transition-delay: 0.1s; }
    .co-card__title.text-mask span { transition-delay: 0.2s; }
    .co-card__price.text-mask span { transition-delay: 0.3s; }

    .swiper-slide-active .text-mask span {
      transform: translateY(0);
      opacity: 1;
    }

    .co-card__collection {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #333;
    }

    .co-card__title {
      font-size: 2rem;
      font-weight: 800;
      text-transform: uppercase;
      color: #000;
      margin: 5px 0;
    }

    .co-card__price {
      font-size: 1.2rem;
      font-weight: 600;
      color: #555;
    }

    /* Controles de Navegación Customizados */
    .co-carousel__nav {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
    }

    .swiper-button-prev-custom,
    .swiper-button-next-custom {
      cursor: pointer;
      font-weight: 600;
      color: #999;
      letter-spacing: 2px;
      transition: color 0.3s ease;
      font-size: 0.9rem;
    }

    .swiper-button-prev-custom:hover,
    .swiper-button-next-custom:hover {
      color: #000;
    }
  </style>
</head>
<body>

  <div class="co-carousel-wrap">
    <div class="swiper co-carousel">
      <div class="swiper-wrapper">
        
        <div class="swiper-slide co-carousel__slide">
          <div class="co-card" style="--card-bg: #e5d3c8;">
            <div class="co-card__shoe">
              <img class="co-card__shoe-img" src="https://parspng.com/wp-content/uploads/2023/02/shoespng.parspng.com-12.png" alt="Nike Air Force" />
              <span class="co-card__shoe-shadow"></span>
            </div>
            <div class="co-card__info">
              <div class="co-card__collection text-mask">
                <span>Men's Original</span>
              </div>
              <div class="co-card__title text-mask">
                <span>Nike Air Force</span>
              </div>
              <div class="co-card__price text-mask">
                <span>$150.00</span>
              </div>
            </div>
          </div>
        </div>

        <div class="swiper-slide co-carousel__slide">
          <div class="co-card" style="--card-bg: #c8e5d9;">
            <div class="co-card__shoe">
              <img class="co-card__shoe-img" src="https://parspng.com/wp-content/uploads/2023/02/shoespng.parspng.com-4.png" alt="Nike Air Jordan" />
              <span class="co-card__shoe-shadow"></span>
            </div>
            <div class="co-card__info">
              <div class="co-card__collection text-mask">
                <span>Men's Original</span>
              </div>
              <div class="co-card__title text-mask">
                <span>Nike Air Jordan</span>
              </div>
              <div class="co-card__price text-mask">
                <span>$240.00</span>
              </div>
            </div>
          </div>
        </div>

        <div class="swiper-slide co-carousel__slide">
          <div class="co-card" style="--card-bg: #e5c8d0;">
            <div class="co-card__shoe">
              <img class="co-card__shoe-img" src="https://parspng.com/wp-content/uploads/2023/02/shoespng.parspng.com-5.png" alt="Nike Air Max" />
              <span class="co-card__shoe-shadow"></span>
            </div>
            <div class="co-card__info">
              <div class="co-card__collection text-mask">
                <span>Men's Original</span>
              </div>
              <div class="co-card__title text-mask">
                <span>Nike Air Max</span>
              </div>
              <div class="co-card__price text-mask">
                <span>$180.00</span>
              </div>
            </div>
          </div>
        </div>

      </div>

      <div class="co-carousel__nav">
        <div class="swiper-button-prev-custom">PREV</div>
        <div class="swiper-button-next-custom">NEXT</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const swiper = new Swiper('.co-carousel', {
        speed: 800,
        loop: true,
        slidesPerView: 1,
        spaceBetween: 30,
        grabCursor: true,
        
        navigation: {
          nextEl: '.swiper-button-next-custom',
          prevEl: '.swiper-button-prev-custom',
        },
      });
    });
  </script>
</body>
</html>
