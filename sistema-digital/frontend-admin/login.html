<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Acceso — IWM Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo span {
      font-size: 1.5rem;
      font-weight: 700;
      color: #38bdf8;
      letter-spacing: -0.5px;
    }

    .logo p {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      transition: border-color 0.15s;
    }

    input:focus {
      outline: none;
      border-color: #38bdf8;
    }

    .campo {
      margin-bottom: 1.25rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }

    button[type="submit"]:hover:not(:disabled) {
      background: #0284c7;
    }

    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error {
      background: #450a0a;
      border: 1px solid #991b1b;
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span>IWM</span>
      <p>Panel de Administración</p>
    </div>

    <div id="error-msg" class="error" role="alert"></div>

    <form id="login-form" novalidate>
      <div class="campo">
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required
          placeholder="admin@ejemplo.com"
        />
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          required
          placeholder="••••••••"
        />
      </div>

      <button type="submit" id="btn-login">Iniciar sesión</button>
    </form>
  </div>

  <script type="module">
    import { login, estaAutenticado } from './modules/auth.js';

    // Si ya hay sesión activa, redirigir al dashboard
    if (estaAutenticado()) {
      window.location.href = '/admin/dashboard.html';
    }

    const form = document.getElementById('login-form');
    const btnLogin = document.getElementById('btn-login');
    const errorMsg = document.getElementById('error-msg');

    function mostrarError(mensaje) {
      errorMsg.textContent = mensaje;
      errorMsg.classList.add('visible');
    }

    function ocultarError() {
      errorMsg.classList.remove('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      ocultarError();

      const email = form.email.value.trim();
      const password = form.password.value;

      if (!email || !password) {
        mostrarError('Ingresa tu correo y contraseña.');
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = 'Verificando...';

      try {
        await login(email, password);
        window.location.href = '/admin/dashboard.html';
      } catch (err) {
        mostrarError(err.message || 'Error al iniciar sesión.');
        btnLogin.disabled = false;
        btnLogin.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
